<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meals">
<title>Meal Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111117;
  --surface:#1a1a24;
  --surface2:#22222f;
  --border:#2a2a3a;
  --text:#e8e8f0;
  --text2:#8888a0;
  --accent:#f59e0b;
  --accent-glow:rgba(245,158,11,.15);
  --eating:rgba(245,158,11,.18);
  --eating-border:rgba(245,158,11,.35);
  --fasting:#1a1a24;
  --marker:#f59e0b;
  --marker-glow:rgba(245,158,11,.5);
  --danger:#ef4444;
  --radius:12px;
  --font:'DM Sans',system-ui,sans-serif;
}
html{font-size:16px}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* ── Header ────────────────────────────────── */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 24px 12px;
  position:sticky;top:0;z-index:10;
  background:var(--bg);
}
.logo{display:flex;align-items:center;gap:10px;font-size:1.25rem;font-weight:600;letter-spacing:-.02em}
.logo-icon{font-size:1.5rem}
.week-nav{display:flex;align-items:center;gap:8px}
.week-nav button{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  width:36px;height:36px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all .15s;
}
.week-nav button:hover{background:var(--surface2);border-color:var(--accent)}
.week-label{
  font-size:.9rem;font-weight:500;color:var(--text2);
  min-width:160px;text-align:center;
}
.today-btn{
  background:var(--accent);color:#000;border:none;
  padding:6px 14px;border-radius:8px;font-size:.8rem;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:all .15s;
}
.today-btn:hover{opacity:.85}

/* ── Week Grid ─────────────────────────────── */
.week-container{
  flex:1;display:flex;gap:6px;
  padding:0 16px 80px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.day-column{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  scroll-snap-align:center;
}
.day-header{
  text-align:center;padding:8px 0 6px;
  position:sticky;top:0;z-index:2;
  background:var(--bg);
}
.day-name{font-size:.7rem;font-weight:600;text-transform:uppercase;color:var(--text2);letter-spacing:.06em}
.day-date{font-size:.85rem;font-weight:500;margin-top:2px}
.day-column.is-today .day-date{
  color:var(--accent);font-weight:700;
}
.day-column.is-today .day-name{color:var(--accent)}

.timeline{
  position:relative;
  flex:1;
  background:var(--surface);
  border-radius:var(--radius);
  border:1px solid var(--border);
  min-height:420px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color .2s;
}
.timeline:hover{border-color:var(--accent);border-color:rgba(245,158,11,.4)}

/* hour ticks */
.hour-tick{
  position:absolute;left:0;right:0;
  border-top:1px solid rgba(255,255,255,.04);
  pointer-events:none;
}
.hour-label{
  position:absolute;left:4px;
  font-size:.55rem;color:var(--text2);opacity:.5;
  transform:translateY(-50%);pointer-events:none;
  line-height:1;
}

/* eating window zone */
.eating-zone{
  position:absolute;left:0;right:0;
  background:var(--eating);
  border-left:3px solid var(--eating-border);
  transition:all .3s ease;
  pointer-events:none;
}

/* meal markers */
.meal-marker{
  position:absolute;left:0;right:0;
  height:22px;
  display:flex;align-items:center;
  padding:0 4px;
  transform:translateY(-50%);
  z-index:3;cursor:pointer;
  transition:all .15s;
}
.meal-marker:hover{transform:translateY(-50%) scale(1.05)}
.meal-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--marker);
  box-shadow:0 0 8px var(--marker-glow);
  flex-shrink:0;
}
.meal-time-label{
  font-size:.6rem;font-weight:600;color:var(--accent);
  margin-left:4px;white-space:nowrap;
}
.meal-note-label{
  font-size:.55rem;color:var(--text2);
  margin-left:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:0;transition:opacity .15s;max-width:50px;
}
.meal-marker:hover .meal-note-label{opacity:1}

/* delete btn on marker */
.meal-delete{
  position:absolute;right:2px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;border-radius:50%;
  background:var(--danger);color:#fff;border:none;
  font-size:.6rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
  font-family:var(--font);line-height:1;
}
.meal-marker:hover .meal-delete{opacity:1}

/* now indicator */
.now-line{
  position:absolute;left:0;right:0;height:2px;
  background:var(--accent);z-index:4;pointer-events:none;
  box-shadow:0 0 6px var(--marker-glow);
}
.now-dot{
  position:absolute;left:-3px;top:-3px;
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
}

/* overnight fast badge */
.overnight-fast{
  position:absolute;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;z-index:2;
  gap:1px;
}
.overnight-fast-label{
  font-size:.55rem;font-weight:600;color:var(--text2);
  letter-spacing:.02em;text-transform:uppercase;
  opacity:.7;
}
.overnight-fast-value{
  font-size:.7rem;font-weight:700;color:#818cf8;
  text-shadow:0 0 8px rgba(129,140,248,.3);
}
.overnight-fast-arrow{
  font-size:.5rem;color:#818cf8;opacity:.5;line-height:1;
}
.current-fast{
  position:absolute;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;z-index:5;
  gap:1px;
  background:rgba(129,140,248,.06);
  border-left:2px solid rgba(129,140,248,.25);
}

/* ── Stats Row ──────────────────────────────── */
.day-stats{
  text-align:center;padding:8px 0 4px;
}
.stat-eating{font-size:.7rem;font-weight:600;color:var(--accent)}
.stat-fasting{font-size:.6rem;color:var(--text2);margin-top:1px}
.stat-count{font-size:.55rem;color:var(--text2);margin-top:1px}

/* ── Settings button ────────────────────────── */
.settings-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--text2);
  width:36px;height:36px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all .15s;position:relative;
}
.settings-btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--text)}
.sync-dot{
  position:absolute;top:-2px;right:-2px;
  width:8px;height:8px;border-radius:50%;
  border:2px solid var(--bg);
}
.sync-dot.connected{background:#22c55e}
.sync-dot.disconnected{background:var(--text2)}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Settings Panel ─────────────────────────── */
.settings-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.settings-overlay.active{opacity:1;pointer-events:auto}
.settings-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:28px 24px 24px;
  width:min(400px,92vw);
  transform:translateY(20px);transition:transform .25s;
}
.settings-overlay.active .settings-panel{transform:translateY(0)}
.settings-panel h2{font-size:1.1rem;font-weight:600;margin-bottom:6px}
.settings-desc{font-size:.75rem;color:var(--text2);margin-bottom:18px;line-height:1.5}
.settings-status{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:8px;
  background:var(--surface2);margin-bottom:16px;
  font-size:.8rem;
}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.on{background:#22c55e}
.status-dot.off{background:var(--text2)}
.token-input-wrap{position:relative}
.token-toggle{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:.8rem;font-family:var(--font);
}
.settings-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.settings-actions .btn{flex:1;min-width:0;text-align:center;font-size:.8rem;padding:9px 10px}
.btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sync{background:rgba(129,140,248,.15);color:#818cf8;border:1px solid rgba(129,140,248,.3)}
.btn-sync:hover{background:rgba(129,140,248,.25)}
.sync-msg{
  font-size:.7rem;color:var(--text2);text-align:center;
  margin-top:10px;min-height:1em;
  transition:color .2s;
}
.sync-msg.ok{color:#22c55e}
.sync-msg.err{color:#ef4444}

/* ── FAB ────────────────────────────────────── */
.fab{
  position:fixed;bottom:24px;right:24px;z-index:20;
  width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:#000;
  border:none;font-size:1.8rem;font-weight:300;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(245,158,11,.4);
  transition:all .2s;
  font-family:var(--font);
}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 30px rgba(245,158,11,.5)}
.fab:active{transform:scale(.95)}

/* ── Modal ──────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:28px 24px 24px;
  width:min(380px,92vw);
  transform:translateY(20px);transition:transform .25s;
}
.modal-overlay.active .modal{transform:translateY(0)}
.modal h2{font-size:1.1rem;font-weight:600;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.75rem;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select{
  width:100%;padding:10px 12px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:var(--font);font-size:.9rem;
  outline:none;transition:border-color .15s;
}
.form-group input:focus{border-color:var(--accent)}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn{
  padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:600;
  cursor:pointer;border:none;font-family:var(--font);transition:all .15s;
}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}

/* ── Confirm delete tooltip ─────────────────── */
.confirm-tooltip{
  position:absolute;right:0;top:100%;margin-top:4px;
  background:var(--surface);border:1px solid var(--danger);
  border-radius:8px;padding:8px 10px;z-index:30;
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;font-size:.75rem;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.confirm-tooltip .btn{padding:4px 10px;font-size:.7rem}

/* ── Responsive ─────────────────────────────── */
@media(max-width:499px){
  header{padding:14px 16px 8px;flex-wrap:wrap;gap:8px}
  .logo{font-size:1.05rem}
  .week-nav{order:3;width:100%;justify-content:center}
  .week-container{
    gap:4px;padding:0 4px 80px;
    overflow:hidden;
    flex-wrap:nowrap;
  }
  .day-column{
    min-width:calc((100vw - 16px) / 3);
    max-width:calc((100vw - 16px) / 3);
    flex:0 0 auto;
    padding:0;
  }
  .timeline{min-height:55vh}
  .fab{bottom:16px;right:16px;width:50px;height:50px;font-size:1.5rem}
  .meal-note-label{opacity:1}
  .meal-delete{opacity:.7}
}
@media(min-width:500px) and (max-width:900px){
  .day-column{min-width:90px}
}

/* ── Animations ─────────────────────────────── */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.meal-marker{animation:fadeInUp .3s ease}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">&#127860;</span>
    <span>Meal Tracker <small style="font-size:.6em;color:var(--text2)">(v11)</small></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="today-btn" id="todayBtn">Danas</button>
    <button class="settings-btn" id="settingsBtn" aria-label="Podešavanja">
      &#9881;
      <span class="sync-dot disconnected" id="syncDot"></span>
    </button>
  </div>
  <nav class="week-nav">
    <button id="prevWeek" aria-label="Previous week">&#8249;</button>
    <span class="week-label" id="weekLabel"></span>
    <button id="nextWeek" aria-label="Next week">&#8250;</button>
  </nav>
</header>

<div class="week-container" id="weekContainer"></div>

<button class="fab" id="fabAdd" aria-label="Dodaj obrok">+</button>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h2>Cloud Sync</h2>
    <p class="settings-desc">Povezi sa GitHub Gist-om da sacuvas podatke u oblaku. Radi na svim uredjajima.</p>
    <div class="settings-status">
      <span class="status-dot off" id="statusDot"></span>
      <span id="statusText">Nije povezano</span>
    </div>
    <div class="form-group">
      <label for="ghToken">GitHub Personal Access Token</label>
      <div class="token-input-wrap">
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
        <button class="token-toggle" id="tokenToggle">prikazi</button>
      </div>
    </div>
    <div class="form-group" id="gistIdGroup" style="display:none">
      <label for="ghGistId">Gist ID (opciono, za postojeci Gist)</label>
      <input type="text" id="ghGistId" placeholder="automatski se kreira">
    </div>
    <div class="settings-actions">
      <button class="btn btn-primary" id="btnConnect">Povezi</button>
      <button class="btn btn-sync" id="btnSyncNow" style="display:none">Sync sada</button>
      <button class="btn btn-danger" id="btnDisconnect" style="display:none">Prekini</button>
    </div>
    <div class="sync-msg" id="syncMsg"></div>
    <div class="form-actions" style="margin-top:14px">
      <button class="btn btn-secondary" id="settingsClose">Zatvori</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Novi obrok</h2>
    <div class="form-group">
      <label for="mealDate">Datum</label>
      <input type="date" id="mealDate">
    </div>
    <div class="form-group">
      <label for="mealTime">Vreme</label>
      <input type="time" id="mealTime">
    </div>
    <div class="form-group">
      <label for="mealNote">Beleška (opciono)</label>
      <input type="text" id="mealNote" placeholder="npr. doručak, ručak..." maxlength="30">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" id="modalCancel">Otkaži</button>
      <button class="btn btn-primary" id="modalSave">Sačuvaj</button>
    </div>
  </div>
</div>

<script>
const DAY_NAMES = ['NED','PON','UTO','SRE','ČET','PET','SUB'];
const MONTH_NAMES = ['jan','feb','mar','apr','maj','jun','jul','avg','sep','okt','nov','dec'];
const HOURS_SHOWN = [0,3,6,9,12,15,18,21];

let currentWeekStart = getMonday(new Date());
let meals = {};
let mobileViewDate = (function() {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - 1);
  return d;
})();

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}

function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function addMeal(dateStr, time, note) {
  if (!meals[dateStr]) meals[dateStr] = [];
  meals[dateStr].push({ time, note: note || '' });
  meals[dateStr].sort((a,b) => a.time.localeCompare(b.time));
  renderWeek();
  pushToGist();
}

function removeMeal(dateStr, time) {
  if (!meals[dateStr]) return;
  const idx = meals[dateStr].findIndex(m => m.time === time);
  if (idx !== -1) meals[dateStr].splice(idx, 1);
  if (meals[dateStr].length === 0) delete meals[dateStr];
  renderWeek();
  pushToGist();
}

function timeToMinutes(t) {
  const [h,m] = t.split(':').map(Number);
  return h * 60 + m;
}

function minutesToPercent(m) {
  return (m / 1440) * 100;
}

function formatDuration(minutes) {
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function isToday(d) {
  const now = new Date();
  return d.getFullYear() === now.getFullYear() &&
         d.getMonth() === now.getMonth() &&
         d.getDate() === now.getDate();
}

function renderWeek() {
  const container = document.getElementById('weekContainer');
  container.innerHTML = '';
  const data = meals;
  const now = new Date();

  const mobile = isMobile();
  const numDays = mobile ? 3 : 7;
  const startDate = mobile ? mobileViewDate : currentWeekStart;

  for (let i = 0; i < numDays; i++) {
    const day = new Date(startDate);
    day.setDate(day.getDate() + i);
    const key = dateKey(day);
    const meals = data[key] || [];
    const today = isToday(day);

    const col = document.createElement('div');
    col.className = 'day-column' + (today ? ' is-today' : '');

    const dayIndex = day.getDay();
    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAY_NAMES[dayIndex]}</div>
        <div class="day-date">${day.getDate()} ${MONTH_NAMES[day.getMonth()]}</div>
      </div>
      <div class="timeline" data-date="${key}"></div>
      <div class="day-stats" id="stats-${key}"></div>
    `;

    container.appendChild(col);

    const timeline = col.querySelector('.timeline');

    for (const h of HOURS_SHOWN) {
      const pct = minutesToPercent(h * 60);
      const tick = document.createElement('div');
      tick.className = 'hour-tick';
      tick.style.top = pct + '%';
      timeline.appendChild(tick);

      if (h % 6 === 0) {
        const lbl = document.createElement('div');
        lbl.className = 'hour-label';
        lbl.style.top = pct + '%';
        lbl.textContent = String(h).padStart(2,'0') + ':00';
        timeline.appendChild(lbl);
      }
    }

    if (meals.length > 0) {
      const firstMin = timeToMinutes(meals[0].time);
      const lastMin = timeToMinutes(meals[meals.length - 1].time);

      if (meals.length >= 2) {
        const zone = document.createElement('div');
        zone.className = 'eating-zone';
        zone.style.top = minutesToPercent(firstMin) + '%';
        zone.style.height = minutesToPercent(lastMin - firstMin) + '%';
        timeline.appendChild(zone);
      }

      const prevDay = new Date(day);
      prevDay.setDate(prevDay.getDate() - 1);
      const prevKey = dateKey(prevDay);
      const prevMeals = data[prevKey];
      if (prevMeals && prevMeals.length > 0) {
        const prevLastMin = timeToMinutes(prevMeals[prevMeals.length - 1].time);
        const overnightMin = (1440 - prevLastMin) + firstMin;
        const badge = document.createElement('div');
        badge.className = 'overnight-fast';
        badge.style.top = '0';
        badge.style.height = minutesToPercent(firstMin) + '%';
        badge.innerHTML = `
          <span class="overnight-fast-label">post</span>
          <span class="overnight-fast-value">${formatDuration(overnightMin)}</span>
          <span class="overnight-fast-arrow">&#9660;</span>
        `;
        timeline.appendChild(badge);
      }

      for (const meal of meals) {
        const min = timeToMinutes(meal.time);
        const marker = document.createElement('div');
        marker.className = 'meal-marker';
        marker.style.top = minutesToPercent(min) + '%';
        marker.innerHTML = `
          <span class="meal-dot"></span>
          <span class="meal-time-label">${meal.time}</span>
          ${meal.note ? `<span class="meal-note-label">${escapeHtml(meal.note)}</span>` : ''}
          <button class="meal-delete" data-date="${key}" data-time="${meal.time}" title="Obriši">&times;</button>
        `;
        timeline.appendChild(marker);
      }

      const eatingMin = lastMin - firstMin;
      const fastingMin = 1440 - eatingMin;
      const statsEl = col.querySelector('.day-stats');
      statsEl.innerHTML = `
        <div class="stat-eating">${formatDuration(eatingMin)} jedenje</div>
        <div class="stat-fasting">${formatDuration(fastingMin)} post</div>
        <div class="stat-count">${meals.length} ${meals.length === 1 ? 'obrok' : meals.length < 5 ? 'obroka' : 'obroka'}</div>
      `;
    } else {
      const statsEl = col.querySelector('.day-stats');
      statsEl.innerHTML = `<div class="stat-fasting" style="opacity:.4">—</div>`;
    }

    if (today) {
      const nowMin = now.getHours() * 60 + now.getMinutes();
      const nowLine = document.createElement('div');
      nowLine.className = 'now-line';
      nowLine.style.top = minutesToPercent(nowMin) + '%';
      nowLine.innerHTML = '<div class="now-dot"></div>';
      timeline.appendChild(nowLine);

      let lastMealMin = null;
      let fromPrev = false;
      const before = meals.filter(m => timeToMinutes(m.time) <= nowMin);
      if (before.length > 0) {
        lastMealMin = timeToMinutes(before[before.length - 1].time);
      } else {
        const prevDay = new Date(day);
        prevDay.setDate(prevDay.getDate() - 1);
        const prevMeals = data[dateKey(prevDay)];
        if (prevMeals && prevMeals.length > 0) {
          lastMealMin = timeToMinutes(prevMeals[prevMeals.length - 1].time);
          fromPrev = true;
        }
      }
      if (lastMealMin !== null) {
        const fastMin = fromPrev ? (1440 - lastMealMin) + nowMin : nowMin - lastMealMin;
        const badgeTop = fromPrev ? 0 : lastMealMin;
        const badgeH = fromPrev ? nowMin : fastMin;
        const badge = document.createElement('div');
        badge.className = 'current-fast';
        badge.style.top = minutesToPercent(badgeTop) + '%';
        badge.style.height = minutesToPercent(badgeH) + '%';
        badge.innerHTML = `
          <span class="overnight-fast-label">post</span>
          <span class="overnight-fast-value">${formatDuration(fastMin)}</span>
          <span class="overnight-fast-arrow">&#9660;</span>
        `;
        timeline.appendChild(badge);
      }
    }

    timeline.addEventListener('click', (e) => {
      if (e.target.closest('.meal-delete') || e.target.closest('.meal-marker')) return;
      const rect = timeline.getBoundingClientRect();
      const pct = (e.clientY - rect.top) / rect.height;
      const totalMin = Math.round(pct * 1440);
      const h = Math.floor(totalMin / 60);
      const m = Math.round(totalMin % 60 / 5) * 5;
      const timeStr = String(h).padStart(2,'0') + ':' + String(m % 60).padStart(2,'0');
      openModal(key, timeStr);
    });
  }

  updateWeekLabel();
  scrollToToday();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function updateWeekLabel() {
  const ref = isMobile() ? getMonday(mobileViewDate) : currentWeekStart;
  const end = new Date(ref);
  end.setDate(end.getDate() + 6);
  const label = `${ref.getDate()} ${MONTH_NAMES[ref.getMonth()]} — ${end.getDate()} ${MONTH_NAMES[end.getMonth()]}`;
  document.getElementById('weekLabel').textContent = label;
}

function scrollToToday() {
}

// Navigation
document.getElementById('prevWeek').addEventListener('click', () => {
  if (isMobile()) {
    mobileViewDate.setDate(mobileViewDate.getDate() - 7);
  } else {
    currentWeekStart.setDate(currentWeekStart.getDate() - 7);
  }
  renderWeek();
});

document.getElementById('nextWeek').addEventListener('click', () => {
  if (isMobile()) {
    mobileViewDate.setDate(mobileViewDate.getDate() + 7);
  } else {
    currentWeekStart.setDate(currentWeekStart.getDate() + 7);
  }
  renderWeek();
});

document.getElementById('todayBtn').addEventListener('click', () => {
  if (isMobile()) {
    const today = new Date();
    today.setHours(0,0,0,0);
    mobileViewDate = new Date(today);
    mobileViewDate.setDate(mobileViewDate.getDate() - 1);
  } else {
    currentWeekStart = getMonday(new Date());
  }
  renderWeek();
});

// Modal
const overlay = document.getElementById('modalOverlay');
const dateInput = document.getElementById('mealDate');
const timeInput = document.getElementById('mealTime');
const noteInput = document.getElementById('mealNote');

function openModal(dateStr, timeStr) {
  dateInput.value = dateStr || dateKey(new Date());
  if (timeStr) {
    timeInput.value = timeStr;
  } else {
    const now = new Date();
    timeInput.value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  noteInput.value = '';
  overlay.classList.add('active');
  setTimeout(() => timeInput.focus(), 100);
}

function closeModal() {
  overlay.classList.remove('active');
}

document.getElementById('fabAdd').addEventListener('click', () => openModal());
document.getElementById('modalCancel').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

document.getElementById('modalSave').addEventListener('click', () => {
  const d = dateInput.value;
  const t = timeInput.value;
  if (!d || !t) return;
  addMeal(d, t, noteInput.value.trim());
  closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && overlay.classList.contains('active')) {
    document.getElementById('modalSave').click();
  }
});

// Delete meals (event delegation)
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.meal-delete');
  if (!btn) return;
  e.stopPropagation();
  const date = btn.dataset.date;
  const time = btn.dataset.time;
  removeMeal(date, time);
});

// Mobile helpers
function isMobile() { return window.innerWidth < 500; }

(function setupSwipe() {
  const container = document.getElementById('weekContainer');
  let startX = 0, startY = 0, swiping = false;

  container.addEventListener('touchstart', (e) => {
    if (!isMobile()) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });

  container.addEventListener('touchend', (e) => {
    if (!isMobile() || !swiping) return;
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0) {
      mobileViewDate.setDate(mobileViewDate.getDate() + 1);
    } else {
      mobileViewDate.setDate(mobileViewDate.getDate() - 1);
    }
    renderWeek();
  }, { passive: true });
})();
window.addEventListener('resize', () => { renderWeek(); });

// Update now-line every minute
setInterval(() => {
  const nowLines = document.querySelectorAll('.now-line');
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  nowLines.forEach(l => { l.style.top = minutesToPercent(nowMin) + '%'; });
}, 60000);

// ── Gist API ──────────────────────────────────
const GIST_TOKEN_KEY = 'mealTracker_ghToken';
const GIST_ID_KEY = 'mealTracker_gistId';
const GIST_FILE = 'meal-tracker-data.json';

function getGistConfig() {
  return {
    token: localStorage.getItem(GIST_TOKEN_KEY) || '',
    gistId: localStorage.getItem(GIST_ID_KEY) || ''
  };
}

function isGistConnected() {
  const c = getGistConfig();
  return !!(c.token && c.gistId);
}

async function gistCreate(token) {
  const res = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description: 'Meal Tracker data',
      public: false,
      files: { [GIST_FILE]: { content: '{}' } }
    })
  });
  if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
  return (await res.json()).id;
}

async function pushToGist() {
  if (!isGistConnected()) return;
  updateSyncDot('syncing');
  try {
    const { token, gistId } = getGistConfig();
    await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(meals) } } })
    });
    updateSyncDot('connected');
  } catch {
    updateSyncDot('connected');
  }
}

async function pullFromGist() {
  if (!isGistConnected()) return;
  updateSyncDot('syncing');
  try {
    const { token, gistId } = getGistConfig();
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
    const data = await res.json();
    const file = data.files[GIST_FILE];
    if (file) {
      try { meals = JSON.parse(file.content) || {}; } catch { meals = {}; }
    }
    renderWeek();
    updateSyncDot('connected');
  } catch (err) {
    updateSyncDot('connected');
    throw err;
  }
}

function updateSyncDot(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + state;
}

function showSyncMsg(msg, cls) {
  const el = document.getElementById('syncMsg');
  el.textContent = msg;
  el.className = 'sync-msg ' + (cls || '');
  clearTimeout(showSyncMsg._t);
  showSyncMsg._t = setTimeout(() => { el.textContent = ''; el.className = 'sync-msg'; }, 4000);
}

function updateSettingsUI() {
  const connected = isGistConnected();
  const { token, gistId } = getGistConfig();
  document.getElementById('statusDot').className = 'status-dot ' + (connected ? 'on' : 'off');
  document.getElementById('statusText').textContent = connected ? `Povezano (Gist: ${gistId.slice(0,8)}...)` : 'Nije povezano';
  document.getElementById('ghToken').value = token;
  document.getElementById('ghGistId').value = gistId;
  document.getElementById('btnConnect').style.display = connected ? 'none' : '';
  document.getElementById('btnSyncNow').style.display = connected ? '' : 'none';
  document.getElementById('btnDisconnect').style.display = connected ? '' : 'none';
  document.getElementById('gistIdGroup').style.display = connected ? 'none' : '';
  updateSyncDot(connected ? 'connected' : 'disconnected');
}

// Settings panel events
document.getElementById('settingsBtn').addEventListener('click', () => {
  updateSettingsUI();
  document.getElementById('settingsOverlay').classList.add('active');
});

document.getElementById('settingsClose').addEventListener('click', () => {
  document.getElementById('settingsOverlay').classList.remove('active');
});

document.getElementById('settingsOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('settingsOverlay'))
    document.getElementById('settingsOverlay').classList.remove('active');
});

document.getElementById('tokenToggle').addEventListener('click', () => {
  const inp = document.getElementById('ghToken');
  const btn = document.getElementById('tokenToggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'sakrij'; }
  else { inp.type = 'password'; btn.textContent = 'prikazi'; }
});

document.getElementById('btnConnect').addEventListener('click', async () => {
  const token = document.getElementById('ghToken').value.trim();
  if (!token) { showSyncMsg('Unesi token', 'err'); return; }
  const existingId = document.getElementById('ghGistId').value.trim();
  showSyncMsg('Povezivanje...', '');
  try {
    let gistId;
    if (existingId) {
      const res = await fetch(`https://api.github.com/gists/${existingId}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      if (!res.ok) throw new Error('Gist nije pronadjen');
      gistId = existingId;
    } else {
      gistId = await gistCreate(token);
    }
    localStorage.setItem(GIST_TOKEN_KEY, token);
    localStorage.setItem(GIST_ID_KEY, gistId);
    updateSettingsUI();
    await pullFromGist();
    showSyncMsg('Povezano!', 'ok');
  } catch (err) {
    showSyncMsg('Greska: ' + err.message, 'err');
  }
});

document.getElementById('btnSyncNow').addEventListener('click', async () => {
  try { await pullFromGist(); showSyncMsg('Sinhronizovano!', 'ok'); }
  catch (err) { showSyncMsg('Greska: ' + err.message, 'err'); }
});

document.getElementById('btnDisconnect').addEventListener('click', () => {
  localStorage.removeItem(GIST_TOKEN_KEY);
  localStorage.removeItem(GIST_ID_KEY);
  meals = {};
  renderWeek();
  updateSettingsUI();
  showSyncMsg('Veza prekinuta', '');
});

// Init
(async () => {
  if (isGistConnected()) {
    updateSyncDot('syncing');
    try { await pullFromGist(); } catch { updateSyncDot('connected'); }
  } else {
    renderWeek();
    updateSyncDot('disconnected');
  }
})();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
